<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Chimera</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>
<body>
    <div class="container-fluid">
        <!-- navbar -->
        <section class="row">
            <nav class="navbar navbar-expand-lg">
                <a href="index.html" class="navbar-brand">Chimera</a>

                <button class="navbar-toggler" data-bs-target="#navbarcollapse" data-bs-toggle="collapse">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarcollapse">
                    <div class="navbar-nav">
                        <a href="index.html" class="nav-link">Home</a>
                        <a href="electronics.html" class="nav-link">Electronics</a>
                        <a href="fashions.html" class="nav-link">Fashions</a>
                        <a href="shoes.html" class="nav-link">Shoes</a>
                        <a href="food.html" class="nav-link">Food</a>
                        <a href="books.html" class="nav-link">Books</a>
                    </div>
                    <div class="navbar-nav ms-auto">
                        <a href="login.html" class="nav-link">Login</a>
                        <a href="register.html" class="nav-link active">Register</a>
                    </div>
                </div>
            </nav>
        </section>
        <!-- end of navbar -->

        <!-- registration form -->
        <section class="row justify-content-center mt-5">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white text-center">
                        <h4>Create Your Chimera Account</h4>
                    </div>
                    <div class="card-body">
                        <form action="#" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" name="firstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" name="lastName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                                <div class="form-text">We'll never share your email with anyone else.</div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number (Optional)</label>
                                <input type="tel" class="form-control" id="phone" name="phone">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required minlength="8">
                                <div class="form-text">Password must be at least 8 characters long.</div>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="newsletter">
                                <label class="form-check-label" for="newsletter">
                                    Subscribe to our newsletter for updates and promotions
                                </label>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">Create Account</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <p class="mb-0">Already have an account? <a href="login.html" class="text-success">Login here</a></p>
                    </div>
                </div>
            </div>
        </section>
        <!-- end of registration form -->
    </div>

    <script src="js/bootstrap.bundle.js"></script>
</body>
</html>
